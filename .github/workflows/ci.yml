# Toolkit regression suite — Docker-free by design (hooks are a pure stdin-JSON -> exit-code
# contract), so it runs on every push in seconds. v3 also runs the full e2e: without Docker
# the whole gate/verify/land/sync pipeline is exercisable on a bare runner.
name: ci
on:
  push:
  pull_request:

jobs:
  toolkit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install deps (jq, shellcheck)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq shellcheck
      - name: tests-toolkit
        run: bash loop/tests-toolkit/run.sh
      - name: e2e (no credentials, no herdr)
        run: bash loop/tests-toolkit/e2e-nocreds.sh
